{% if options %}
<fieldset class="filter-group">
    <legend>Размер <small>Д × Ш × В</small></legend>
    <div class="filter-options">
        {% for option in options %}
            <label>
                <input type="checkbox" name="size" value="{{ option.value }}"{% if option.value in selected %} checked{% endif %}>
                <span>{{ option.label }}</span>
            </label>
        {% endfor %}
    </div>
</fieldset>
{% endif %}
